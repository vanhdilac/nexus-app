
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS - Different Minds. One Direction.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .nexus-gradient-text {
      background: linear-gradient(90deg, #3b82f6 0%, #22c55e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nexus-bg-gradient {
      background: linear-gradient(135deg, #3b82f6 0%, #22c55e 100%);
    }
    .nexus-glow {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }
    /* Force native calendar picker icon to be strictly black and visible */
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      filter: brightness(0); /* Forces the icon to be black */
      opacity: 0.9;
      transition: opacity 0.2s, transform 0.2s;
    }
    input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
      transform: scale(1.1);
    }
    /* Ensure the input itself has enough padding for the icon */
    input[type="date"] {
      position: relative;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
  </style>
